services:

  # ─── Banco de dados PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: staticlass-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: staticlass
      POSTGRES_USER: staticlass
      POSTGRES_PASSWORD: staticlass123
    ports:
      - "5432:5432"
    volumes:
      - staticlass_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staticlass -d staticlass"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── API Flask ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: staticlass-backend
    restart: unless-stopped
    env_file:
      - ./app/backend/.env        # DATABASE_URL, SECRET_KEY, etc.
    environment:
      DATABASE_URL: postgresql://staticlass:staticlass123@db:5432/staticlass
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/../../../uploads   # imagens persistidas fora do container
    depends_on:
      db:
        condition: service_healthy

  # ─── Frontend Web (estático exportado pelo Expo) ────────────────────────
  # Execute "npx expo export" antes de subir este serviço.
  # O output vai para app/frontend/dist/ — servido pelo nginx.
  web:
    image: nginx:alpine
    container_name: staticlass-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./app/frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  staticlass_db_data:

services:

  # ─── Banco de dados MySQL ────────────────────────────────────────────────
  db:
    image: mysql:8.4
    container_name: staticlass-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: staticlass123
      MYSQL_DATABASE: staticlass
      MYSQL_USER: flask_user
      MYSQL_PASSWORD: staticlass123
    ports:
      - "3306:3306"
    volumes:
      - staticlass_db_data:/var/lib/mysql
      - ./propet.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "flask_user", "-pstaticlass123"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── API Flask ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: staticlass-backend
    restart: unless-stopped
    env_file:
      - ./app/backend/.env        # DB_HOST, DB_USER, DB_PASS, DB_NAME, SECRET_KEY, etc.
    environment:
      DB_HOST: db                 # aponta para o serviço "db" acima
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/../../../uploads   # imagens persistidas fora do container
    depends_on:
      db:
        condition: service_healthy

  # ─── Frontend Web (estático exportado pelo Expo) ────────────────────────
  # Execute "npx expo export" antes de subir este serviço.
  # O output vai para app/frontend/dist/ — servido pelo nginx.
  web:
    image: nginx:alpine
    container_name: staticlass-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./app/frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  staticlass_db_data:

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # SPA: redireciona qualquer rota desconhecida para index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Cache longo para assets com hash no nome (JS/CSS gerados pelo Expo)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy reverso para a API (evita CORS no browser em produção)
    location /api/ {
        proxy_pass         http://backend:5000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
